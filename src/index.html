<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSONL Conversation Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/main.css">
</head>
<body>

<div class="topbar">
  <h1>JSONL Conversation Viewer</h1>
  <div class="track-legend">
    <span class="legend-item"><span class="legend-dot" style="background:var(--user)"></span>user</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--thinking)"></span>thinking</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--tool)"></span>tool call</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--result-ok)"></span>result</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--result-err)"></span>error</span>
  </div>
  <div class="stats" id="stats"></div>
  <button class="clear-btn" id="clearBtn">Clear</button>
  <button class="history-toggle" id="historyToggle" title="History">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5V8l2.5 1.5"/></svg>
  </button>
</div>

<div class="app-body">
<aside class="history-drawer" id="historyDrawer">
  <div class="history-header">
    <span class="pane-label">History</span>
    <button class="save-btn" id="saveBtn" title="Save current input">+ Save</button>
  </div>
  <ul class="history-list" id="historyList"></ul>
  <div class="history-empty" id="historyEmpty">No saved entries yet.</div>
</aside>

<div class="panes">
  <div class="pane pane-input" id="inputPane">
    <div class="pane-input-header">
      <div class="pane-label">Paste JSONL</div>
      <button class="fold-btn" id="foldBtn" aria-expanded="true" aria-controls="input" title="Collapse input pane">‹</button>
    </div>
    <textarea id="input" spellcheck="false" placeholder="Paste JSONL lines here — one JSON object per line. New lines pasted anywhere will re-render the conversation on the right."></textarea>
  </div>
  <div class="pane pane-output" id="output"></div>
</div>
</div><!-- .app-body -->

<!-- DEV: served as ES module by Bun -->
<!-- BUILD: marker replaced with inlined <script> by build.js -->
<script type="module" src="/app.js"></script>

</body>
</html>
